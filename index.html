// ─── MONDAY API ────────────────────────────────────────────────────────────────
async function fetchBoard(boardId) {
  const q = `{ boards(ids:[${boardId}]){ items_page(limit:500){ items{ id name group{id} column_values{id text} } } } }`;
  const r = await fetch(MONDAY_API,{method:"POST",headers:{"Content-Type":"application/json","Authorization":MONDAY_TOKEN,"API-Version":"2024-01"},body:JSON.stringify({query:q})});
  const d = await r.json();
  if(d.errors) throw new Error(d.errors[0]?.message);
  return (d?.data?.boards?.[0]?.items_page?.items||[]).map(i=>({
    id:String(i.id), name:i.name, group_id:i.group?.id||"",
    columns:Object.fromEntries((i.column_values||[]).map(c=>[c.id,c.text||""]))
  }));
}

function evaluarExpediente(client) {
  const c = client.columns||{}, v = client.visaType;

    "EB-1":[{id:"text_mkxv9s3c",n:"Nivel educativo"},{id:"text_mkxvtcme",n:"Área especialidad"},{id:"text_mkxvfhyb",n:"Publicaciones"},{id:"number36m1v1r1",n:"Años experiencia"},{id:"long_textqq094r8p",n:"Descripción caso"},{id:"long_text_mm0agtw6",n:"Experiencia laboral"}],

    "EB-5":[{id:"numbers8iemnzj",n:"Monto inversión"},{id:"long_textqq094r8p",n:"Descripción caso"}],
    "Visa U / VAWA":[{id:"long_textqq094r8p",n:"Descripción caso"},{id:"multi_selectjf5hjjtk",n:"Tipo de crimen"},{id:"text_mm0a2x79",n:"Antecedentes"}],
    "SIJS Juvenil":[{id:"dateuciezi89",n:"Fecha nacimiento"},{id:"long_textqq094r8p",n:"Descripción caso"}],
  };
  const campos = camposMap[v]||[{id:"long_textqq094r8p",n:"Descripción caso"}];
  const faltantes = campos.filter(f=>!c[f.id]||!c[f.id].trim()).map(f=>f.n);
  let pct = Math.round(((campos.length-faltantes.length)/campos.length)*100);

  if(pct<60)riesgos.push("Necesita refuerzo de evidencia");
  if(riesgos.length===0)riesgos.push("Buena base documental");
  const nombreCliente = client.name.split(" ").map(w=>w.charAt(0)+w.slice(1).toLowerCase()).join(" ");
  const firma = `\n\nAtentamente,\n${client.paralegal||"El equipo de paralegales"}\nElio Vázquez Law Team | Visas Especiales\nDoral: (305) 845-7788 | Orlando: (321) 247-5148 | Kissimmee: (407) 381-5100\ninfo@visasespeciales.com | www.visasespeciales.com`;

  const listaCampos = faltantes.length>0 ? "\n\nInformación que nos falta para completar su evaluación:\n" + faltantes.map(f=>"  • "+f).join("\n") : "";

  emailSubject = "Evaluación de su caso " + client.visaType + " — Visas Especiales";

// ─── PANTALLA LOGIN ────────────────────────────────────────────────────────────
function LoginScreen({onLogin}) {
  const [email,setEmail]=useState(""), [pass,setPass]=useState(""), [conf,setConf]=useState(""), [err,setErr]=useState(""), [loading,setLoading]=useState(false), [mode,setMode]=useState("login"), [msg,setMsg]=useState("");
  
  const handleLogin=async()=>{
    if(!email||!pass){setErr("Completa todos los campos");return;}
    setErr(""); setLoading(true);
    try {
      const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
      if(error) throw error;
      onLogin(data.user);
    } catch(e){ setErr(e.message==="Invalid login credentials"?"Correo o contraseña incorrectos":e.message); }
    setLoading(false);
  };

  const handleRegister=async()=>{
    if(!email||!pass||!conf){setErr("Completa todos los campos");return;}
    if(pass.length<8){setErr("La contraseña debe tener mínimo 8 caracteres");return;}
    if(pass!==conf){setErr("Las contraseñas no coinciden");return;}
    setErr(""); setLoading(true);
    try {
      const {data,error}=await sb.auth.signUp({email,password:pass,options:{emailRedirectTo:null,data:{}}});
      if(error) throw error;
      // Intentar login directo
      const {data:loginData,error:loginErr}=await sb.auth.signInWithPassword({email,password:pass});
      if(loginErr) {
        setMsg("✅ Cuenta creada. Ya puedes iniciar sesión.");
        setMode("login"); setPass(""); setConf("");
      } else {
        onLogin(loginData.user);
      }
    } catch(e){ setErr(e.message||"Error al crear cuenta"); }
    setLoading(false);
  };

  const inputStyle={width:"100%",padding:"11px 14px",border:"1px solid #d1d5db",borderRadius:10,fontSize:14,marginBottom:12,outline:"none",fontFamily:"Georgia,serif"};
  const btnPrimary={width:"100%",padding:12,background:"#0f2d4a",color:"white",border:"none",borderRadius:10,fontSize:14,fontWeight:700,cursor:"pointer"};

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#0f2d4a 0%,#0a1628 100%)"}}>
      <div style={{background:"white",borderRadius:20,padding:"36px",maxWidth:380,width:"90%",textAlign:"center",boxShadow:"0 20px 60px rgba(0,0,0,0.4)"}}>
        <div style={{fontSize:40,marginBottom:10}}>⚖️</div>
        <h2 style={{color:"#0f2d4a",fontSize:19,marginBottom:4}}>Evaluador de Expedientes</h2>
        <p style={{color:"#6b7280",fontSize:11,marginBottom:20}}>Elio Vázquez Law Team · Uso Interno</p>
        
        {/* Tabs */}
        <div style={{display:"flex",borderRadius:10,overflow:"hidden",border:"1px solid #e5e7eb",marginBottom:20}}>
          {["login","register"].map(m=>(
            <button key={m} onClick={()=>{setMode(m);setErr("");setMsg("");}} style={{flex:1,padding:"9px 0",border:"none",background:mode===m?"#0f2d4a":"white",color:mode===m?"white":"#6b7280",fontWeight:mode===m?700:400,fontSize:12,cursor:"pointer"}}>
              {m==="login"?"Iniciar Sesión":"Crear Cuenta"}
            </button>
          ))}
        </div>

        {msg&&<div style={{background:"#d1fae5",color:"#065f46",borderRadius:8,padding:"9px 12px",fontSize:12,marginBottom:14}}>{msg}</div>}
        
        <input type="email" placeholder="Correo electrónico" value={email} onChange={e=>setEmail(e.target.value)} style={inputStyle}/>
        <input type="password" placeholder="Contraseña" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&(mode==="login"?handleLogin():null)} style={inputStyle}/>
        
        {mode==="register"&&<input type="password" placeholder="Confirmar contraseña" value={conf} onChange={e=>setConf(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleRegister()} style={inputStyle}/>}
        
        {err&&<p style={{color:"#dc2626",fontSize:12,marginBottom:10,textAlign:"left"}}>{err}</p>}
        
        <button onClick={mode==="login"?handleLogin:handleRegister} disabled={loading} style={{...btnPrimary,opacity:loading?0.7:1,marginBottom:mode==="register"?0:8}}>
          {loading?(mode==="login"?"Ingresando...":"Creando cuenta..."):(mode==="login"?"Entrar →":"Crear mi cuenta")}
        </button>
        
        {mode==="register"&&<p style={{fontSize:10,color:"#9ca3af",marginTop:10,lineHeight:1.5}}>Al crear tu cuenta solo podrás ver los clientes asignados a ti en Monday.com</p>}
      </div>
    </div>
  );
}

            <span style={{fontSize:11,color:"#6b7280",fontWeight:600}}>Probabilidad</span>
            <span style={{fontSize:22,fontWeight:800,color}}>{pct}%</span>
          </div>
          <div style={{background:"#e5e7eb",borderRadius:100,height:6,marginBottom:10}}>
            <div style={{width:`${pct}%`,height:"100%",background:color,borderRadius:100,transition:"width 0.5s"}}/>
          </div>
          {result.campos_faltantes.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:8}}>
            {result.campos_faltantes.slice(0,3).map((f,i)=><span key={i} style={{background:"#fff3f3",color:"#c0392b",borderRadius:5,padding:"2px 7px",fontSize:9}}>⚠ {f}</span>)}
            {result.campos_faltantes.length>3&&<span style={{background:"#f3f4f6",color:"#6b7280",borderRadius:5,padding:"2px 6px",fontSize:9}}>+{result.campos_faltantes.length-3}</span>}
          </div>}
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {/* Botón principal según estado */}
            {!propuestaOk ? (
              <button onClick={()=>onGenerarPropuesta(client)} disabled={generando} style={{width:"100%",padding:"9px 0",background:generando?"#6b7280":"#0f2d4a",color:"white",border:"none",borderRadius:8,fontSize:12,fontWeight:700,cursor:generando?"not-allowed":"pointer",opacity:generando?0.8:1}}>
                {generando?"⏳ Generando propuesta...":"🤖 Generar Propuesta IA"}
              </button>
            ) : (
              <button onClick={()=>onRevisar(client)} style={{width:"100%",padding:"9px 0",background:"#16a34a",color:"white",border:"none",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer"}}>
                📋 Revisar · Aprobar · Enviar
              </button>
            )}
            {/* Botón correo info faltante — solo si <60% */}
            {pct<60&&result.emailBody&&(
              <button onClick={()=>onEmail(client,result)} style={{width:"100%",padding:"9px 0",background:"#1d4ed8",color:"white",border:"none",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer"}}>
                📧 Enviar correo info faltante
              </button>
            )}
            {propuestaOk&&<div style={{background:"#f0fdf4",borderRadius:6,padding:"4px 8px",fontSize:10,color:"#16a34a",textAlign:"center",border:"1px solid #bbf7d0"}}>✅ Propuesta en Monday · Pendiente revisión</div>}
          </div>
        </> : (
          <button onClick={()=>onEvaluate(client)} disabled={evaluating} style={{width:"100%",padding:"10px 0",borderRadius:8,border:"none",background:evaluating?"#f0f0f0":"#0f2d4a",color:evaluating?"#aaa":"white",fontWeight:700,fontSize:12,cursor:evaluating?"not-allowed":"pointer",opacity:evaluating?0.7:1}}>
            {evaluating?"⏳ Evaluando...":"🔍 Evaluar Expediente"}
          </button>
        )}
      </div>
    </div>
  );
}

// ─── MODAL EMAIL ───────────────────────────────────────────────────────────────
function EmailModal({client, result, onClose, onSent}) {
  const [emailDest,setEmailDest]=useState(client.email||"");
  const [sending,setSending]=useState(false);
  const [sent,setSent]=useState(false);
  const [err,setErr]=useState("");
  const [editBody,setEditBody]=useState(result.emailBody);

  const enviarDirecto=async()=>{
    if(!emailDest){setErr("Ingresa el correo del cliente");return;}
    setSending(true); setErr("");
    try {
      const resp=await fetch(EMAIL_WEBHOOK,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          to: emailDest,
          subject: result.emailSubject,
          body: editBody,
          clientName: client.name
        })
      });
      if(resp.ok||resp.status===200){
        setSent(true);
        if(onSent) onSent();
      } else {
        setErr("Error al enviar. Intenta de nuevo.");
      }
    } catch(e){
      setErr("Error de conexión. Verifica n8n.");
    }
    setSending(false);
  };

  const copiar=()=>{ navigator.clipboard.writeText(editBody); };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"white",borderRadius:16,maxWidth:600,width:"100%",boxShadow:"0 32px 80px rgba(0,0,0,0.4)",overflow:"hidden",maxHeight:"90vh",display:"flex",flexDirection:"column"}}>
        <div style={{background:"#1d4ed8",padding:"14px 20px",color:"white",flexShrink:0}}>
          <div style={{fontWeight:800,fontSize:15}}>📧 Correo — {client.name}</div>
          <div style={{fontSize:11,opacity:0.7}}>Probabilidad {result.porcentaje}% · Información pendiente</div>
        </div>
        <div style={{padding:18,overflowY:"auto",flex:1}}>
          {/* Email destino */}
          <div style={{marginBottom:12}}>
            <label style={{fontSize:11,fontWeight:700,color:"#374151",display:"block",marginBottom:4}}>📬 Correo del cliente</label>
            <input type="email" value={emailDest} onChange={e=>setEmailDest(e.target.value)}
              placeholder="email@cliente.com"
              style={{width:"100%",padding:"9px 12px",border:"2px solid",borderColor:emailDest?"#1d4ed8":"#fca5a5",borderRadius:8,fontSize:13,outline:"none"}}/>
            {!emailDest&&<p style={{fontSize:10,color:"#ef4444",marginTop:3}}>⚠ Sin email en Monday — ingrésalo aquí</p>}
          </div>
          {/* Asunto */}
          <div style={{background:"#f0f9ff",border:"1px solid #bae6fd",borderRadius:8,padding:"8px 12px",marginBottom:10}}>
            <span style={{fontSize:10,fontWeight:700,color:"#0369a1"}}>ASUNTO: </span>
            <span style={{fontSize:12,color:"#374151",fontWeight:600}}>{result.emailSubject}</span>
          </div>
          {/* Cuerpo editable */}
          <div style={{marginBottom:12}}>
            <label style={{fontSize:11,fontWeight:700,color:"#374151",display:"block",marginBottom:4}}>✏️ Mensaje (puedes editar)</label>
            <textarea value={editBody} onChange={e=>setEditBody(e.target.value)}
              style={{width:"100%",height:180,padding:"10px 12px",border:"1px solid #d1d5db",borderRadius:8,fontSize:12,resize:"vertical",fontFamily:"Georgia,serif",lineHeight:1.7,outline:"none"}}/>
          </div>
          {err&&<div style={{background:"#fee2e2",border:"1px solid #fca5a5",borderRadius:8,padding:"8px 12px",marginBottom:10,fontSize:12,color:"#7f1d1d"}}>{err}</div>}
          {sent&&<div style={{background:"#d1fae5",border:"1px solid #6ee7b7",borderRadius:8,padding:"10px 14px",marginBottom:10,fontSize:13,color:"#065f46",fontWeight:700,textAlign:"center"}}>✅ Email enviado correctamente a {emailDest}</div>}
        </div>
        <div style={{padding:"12px 18px",borderTop:"1px solid #f0f0f0",display:"flex",gap:8,flexShrink:0}}>
          {!sent ? <>
            <button onClick={enviarDirecto} disabled={sending||!emailDest} style={{flex:2,padding:"11px 0",background:(!emailDest||sending)?"#9ca3af":"#1d4ed8",color:"white",border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:(!emailDest||sending)?"not-allowed":"pointer"}}>
              {sending?"⏳ Enviando...":"📨 Enviar correo ahora"}
            </button>
            <button onClick={copiar} style={{flex:1,padding:"11px 0",background:"#0f2d4a",color:"white",border:"none",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer"}}>📋 Copiar</button>
          </> : 
            <button onClick={onClose} style={{flex:1,padding:"11px 0",background:"#16a34a",color:"white",border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer"}}>✓ Listo — Cerrar</button>
          }
          {!sent&&<button onClick={onClose} style={{padding:"11px 14px",borderRadius:8,border:"1px solid #ddd",background:"white",fontSize:12,cursor:"pointer",color:"#555"}}>Cerrar</button>}
        </div>
      </div>
    </div>
  );
}

// ─── APP PRINCIPAL ─────────────────────────────────────────────────────────────
function App() {
  const [session,setSession]=useState(null);
  const [profile,setProfile]=useState(null);
  const [needPassword,setNeedPassword]=useState(false);
  const [clients,setClients]=useState([]);
  const [loading,setLoading]=useState(false);
  const [results,setResults]=useState({});
  const [evalId,setEvalId]=useState(null);
  const [generandoId,setGenerandoId]=useState(null);
  const [propuestasOk,setPropuestasOk]=useState({});
  const [revisionModal,setRevisionModal]=useState(null);
  const [aprobadas,setAprobadas]=useState({});
  const [activeBoard,setActiveBoard]=useState("inmigrante");
  const [filter,setFilter]=useState("Todos");
  const [emailModal,setEmailModal]=useState(null);
  const [notice,setNotice]=useState(null);
  const [loadingProfile,setLoadingProfile]=useState(true);

  const showN=(msg,type="info")=>{setNotice({msg,type});setTimeout(()=>setNotice(null),5000);};

  // Detectar sesión activa
  useEffect(()=>{
    // Listener primero — captura PASSWORD_RECOVERY antes que getSession
    const {data:{subscription}}=sb.auth.onAuthStateChange((event,session)=>{
      if(event==="PASSWORD_RECOVERY"){
        setNeedPassword(true);
        setSession(session);
        setLoadingProfile(false);
        return;
      }
      if(event==="SIGNED_IN"||event==="TOKEN_REFRESHED"){
        setSession(session);
        if(session) loadProfile(session.user);
      }
      if(event==="SIGNED_OUT"){
        setSession(null); setProfile(null); setLoadingProfile(false);
      }
    });
    // Verificar sesión existente al cargar
    sb.auth.getSession().then(({data:{session}})=>{
      if(session){
        setSession(session);
        loadProfile(session.user);
      } else { setLoadingProfile(false); }
    });
    return ()=>subscription.unsubscribe();
  },[]);

  const loadProfile=async(user)=>{
    setLoadingProfile(true);
    const {data,error}=await sb.from("paralegals").select("*").eq("id",user.id).single();
    if(error||!data){
      // Si no tiene perfil aún, crear uno básico
      const {data:newP}=await sb.from("paralegals").insert({
        id:user.id, email:user.email,
        nombre_completo:user.email.split("@")[0],
        monday_name:user.email.split("@")[0],
        rol:"paralegal"
      }).select().single();
      setProfile(newP||{email:user.email,rol:"paralegal",monday_name:user.email.split("@")[0]});
    } else { setProfile(data); }
    setLoadingProfile(false);
  };

  const logout=async()=>{ await sb.auth.signOut(); setSession(null); setProfile(null); setClients([]); };

  const loadClients=useCallback(async()=>{
    if(!profile) return;
    setLoading(true); setFilter("Todos"); setResults({});
    const board=BOARDS[activeBoard];
    try {
      const raw=await fetchBoard(board.id);
      let filtered=raw;
      // Si no es admin, filtrar por nombre del paralegal
      if(profile.rol!=="admin"){
        filtered=raw.filter(i=>{
          const p=(i.columns.multiple_person_mm0a62y5||"").toLowerCase();
          return p.includes(profile.monday_name.toLowerCase());
        });
      }
      setClients(filtered.map(i=>({
        id:i.id, name:i.name,
        email:i.columns.email_mm1bpzv3||i.columns.email_mkmpp0w4||i.columns.text_mkxvj4fr||"",
        paralegal:i.columns.multiple_person_mm0a62y5||"Sin asignar",
        visaType:board.groups[i.group_id]||"General",
        columns:i.columns, boardType:activeBoard, boardId:board.id,
      })));
      showN(`${filtered.length} clientes cargados`,"success");
    } catch(e){ showN("Error al conectar: "+e.message,"error"); }
    setLoading(false);
  },[activeBoard,profile]);

  const evaluate=useCallback(async(client)=>{
    setEvalId(client.id);
    await new Promise(r=>setTimeout(r,300));
    setResults(p=>({...p,[client.id]:evaluarExpediente(client)}));
    setEvalId(null);
  },[]);

  const generarPropuesta=useCallback(async(client)=>{
    setGenerandoId(client.id);
    try {
      const resp=await fetch(N8N_WEBHOOK,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({event:{pulseId:client.id,itemId:client.id,boardId:client.boardId}})
      });
      if(resp.ok||resp.status===200){
        setPropuestasOk(p=>({...p,[client.id]:true}));
        showN(`✅ Propuesta generada para ${client.name} — revisa en Monday.com`,"success");
      } else {
        showN("Error al generar propuesta","error");
      }
    } catch(e){ showN("Error de conexión con n8n","error"); }
    setGenerandoId(null);
  },[]);

  const regenerarConCambios=useCallback(async(client,notas)=>{
    setGenerandoId(client.id);
    setPropuestasOk(p=>({...p,[client.id]:false}));
    try {
      const resp=await fetch(N8N_WEBHOOK,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({event:{pulseId:client.id,itemId:client.id,boardId:client.boardId},notasRevision:notas})
      });
      if(resp.ok||resp.status===200){
        setPropuestasOk(p=>({...p,[client.id]:true}));
        showN(`🔄 Propuesta regenerada para ${client.name} — revisa en Monday`,"success");
      }
    } catch(e){ showN("Error al regenerar","error"); }
    setGenerandoId(null);
  },[]);

  if(loadingProfile) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0f2d4a"}}>
      <div style={{color:"white",fontSize:16}}>⏳ Cargando...</div>
    </div>
  );

  if(!session) return <LoginScreen onLogin={u=>{setSession({user:u});loadProfile(u);}}/>;
  if(!profile) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0f2d4a"}}>
      <div style={{color:"white",fontSize:14,textAlign:"center"}}>
        <div style={{fontSize:40,marginBottom:12}}>⚠️</div>
        <p>Tu cuenta está pendiente de activación por el administrador.</p>
        <button onClick={logout} style={{marginTop:16,padding:"10px 24px",background:"#d4a843",border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer",color:"#0f2d4a"}}>Cerrar sesión</button>
      </div>
    </div>
  );

  const visaTypes=["Todos",...[...new Set(clients.map(c=>c.visaType))]];
  const filtered=filter==="Todos"?clients:clients.filter(c=>c.visaType===filter);
  const pendEmail=Object.values(results).filter(r=>r.porcentaje<60&&r.emailBody).length;

  return (
    <div style={{minHeight:"100vh",background:"#f0f2f8",fontFamily:"Georgia,serif"}}>
      {notice&&<div style={{position:"fixed",top:16,right:16,zIndex:999,background:notice.type==="success"?"#d1fae5":notice.type==="error"?"#fee2e2":"#e0f2fe",color:notice.type==="success"?"#065f46":notice.type==="error"?"#7f1d1d":"#0369a1",border:"1px solid #ccc",borderRadius:10,padding:"10px 18px",fontSize:12,fontWeight:600,boxShadow:"0 4px 12px rgba(0,0,0,0.1)",maxWidth:380}}>{notice.msg}</div>}
      {emailModal&&<EmailModal client={emailModal.client} result={emailModal.result} onClose={()=>setEmailModal(null)} onSent={()=>showN(`✅ Email enviado a ${emailModal.client.name}`,'success')}/>}
      {revisionModal&&<RevisionModal client={revisionModal} 
        onClose={()=>setRevisionModal(null)}
        onSolicitar={(cl,notas)=>regenerarConCambios(cl,notas)}
        onAprobar={(cl)=>{setAprobadas(p=>({...p,[cl.id]:true}));showN(`✅ Correo de propuesta enviado a ${cl.name}`,"success");}}
      />}

      {/* HEADER */}
      <div style={{background:"linear-gradient(135deg,#0f2d4a,#0a1628)",padding:"18px 24px",color:"white"}}>
        <div style={{maxWidth:1000,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12,marginBottom:12}}>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:9}}>
                <span style={{fontSize:20}}>⚖️</span>
                <h1 style={{margin:0,fontSize:17,fontWeight:800}}>Evaluador de Expedientes</h1>
              </div>
              <p style={{margin:"3px 0 0",color:"rgba(255,255,255,0.4)",fontSize:10}}>Elio Vázquez Law Team · Doral · Orlando · Kissimmee</p>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:12,fontWeight:700,color:"white"}}>{profile.nombre_completo}</div>
                <div style={{fontSize:10,color:"rgba(255,255,255,0.5)"}}>{profile.rol==="admin"?"👑 Administrador":"Paralegal"}</div>
              </div>
              <button onClick={logout} style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:8,padding:"6px 12px",color:"white",fontSize:11,cursor:"pointer"}}>Salir</button>
            </div>
          </div>

          {/* BOARDS */}
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {Object.entries(BOARDS).map(([k,b])=>(
              <button key={k} onClick={()=>{setActiveBoard(k);setClients([]);setResults({});setFilter("Todos");}} style={{display:"flex",alignItems:"center",gap:7,padding:"7px 14px",borderRadius:10,border:"2px solid",borderColor:activeBoard===k?"#d4a843":"rgba(255,255,255,0.15)",background:activeBoard===k?"rgba(255,255,255,0.12)":"transparent",color:"white",cursor:"pointer",fontWeight:activeBoard===k?800:400,fontSize:11}}>
                <span>{b.icon}</span><span>{b.label}</span>
                {activeBoard===k&&clients.length>0&&<span style={{background:"#d4a843",color:"#0a1628",borderRadius:10,padding:"1px 7px",fontSize:10,fontWeight:800}}>{clients.length}</span>}
              </button>
            ))}
            <button onClick={loadClients} disabled={loading} style={{marginLeft:"auto",background:"#d4a843",border:"none",borderRadius:10,padding:"7px 18px",color:"#0a1628",fontWeight:800,fontSize:11,cursor:loading?"not-allowed":"pointer",opacity:loading?0.7:1}}>
              {loading?"⏳ Cargando...":clients.length===0?"📋 Cargar Clientes":"🔄 Recargar"}
            </button>
          </div>

          {/* STATS */}
          {Object.keys(results).length>0&&<div style={{display:"flex",gap:20,marginTop:12,paddingTop:10,borderTop:"1px solid rgba(255,255,255,0.1)"}}>
            {[{l:"Clientes",v:clients.length,c:"#d4a843"},{l:"Evaluados",v:Object.keys(results).length,c:"#60a5fa"},{l:"≥60%",v:Object.values(results).filter(r=>r.porcentaje>=60).length,c:"#34d399"},{l:"Correos pendientes",v:pendEmail,c:"#f87171"}].map(s=>(
              <div key={s.l} style={{textAlign:"center"}}><div style={{fontSize:20,fontWeight:800,color:s.c}}>{s.v}</div><div style={{fontSize:9,color:"rgba(255,255,255,0.4)",textTransform:"uppercase",letterSpacing:1}}>{s.l}</div></div>
            ))}
          </div>}
        </div>
      </div>

      {/* CONTENT */}
      <div style={{maxWidth:1000,margin:"0 auto",padding:"16px 14px"}}>
        {clients.length===0&&!loading&&(
          <div style={{textAlign:"center",padding:"55px 20px"}}>
            <div style={{fontSize:46,marginBottom:10}}>{BOARDS[activeBoard].icon}</div>
            <h3 style={{margin:"0 0 7px",color:"#374151",fontSize:17}}>{BOARDS[activeBoard].label}</h3>
            <p style={{color:"#6b7280",fontSize:13,maxWidth:360,margin:"0 auto 18px",lineHeight:1.7}}>
              {profile.rol==="admin"?"Verás todos los clientes asignados en este board.":`Verás únicamente los clientes asignados a ti: ${profile.monday_name}`}
            </p>
            <button onClick={loadClients} style={{background:"#0f2d4a",color:"white",border:"none",borderRadius:10,padding:"10px 24px",fontSize:13,fontWeight:700,cursor:"pointer"}}>📋 Cargar mis clientes</button>
          </div>
        )}
        {clients.length>0&&<>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {visaTypes.map(v=><button key={v} onClick={()=>setFilter(v)} style={{padding:"5px 11px",borderRadius:18,border:"1px solid",borderColor:filter===v?"#0f2d4a":"#e0e0e0",background:filter===v?"#0f2d4a":"white",color:filter===v?"white":"#666",fontSize:11,fontWeight:filter===v?700:400,cursor:"pointer"}}>{v} ({v==="Todos"?clients.length:clients.filter(c=>c.visaType===v).length})</button>)}
            </div>
            {filtered.some(c=>!results[c.id])&&<button onClick={async()=>{for(const c of filtered) if(!results[c.id]) await evaluate(c);}} disabled={evalId!==null} style={{background:"#0f2d4a",color:"white",border:"none",borderRadius:8,padding:"8px 14px",fontSize:11,fontWeight:700,cursor:evalId?"not-allowed":"pointer",opacity:evalId?0.6:1}}>
              🚀 Evaluar todos ({filtered.filter(c=>!results[c.id]).length} pendientes)
            </button>}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:11}}>
            {filtered.map(client=>(
              <ClientCard key={client.id} client={client} result={results[client.id]} evaluating={evalId===client.id}
                onEvaluate={evaluate}
                onEmail={(cl,res)=>setEmailModal({client:cl,result:res})}
                onGenerarPropuesta={generarPropuesta}
                generando={generandoId===client.id}
                propuestaOk={!!propuestasOk[client.id]}
                onRevisar={(cl)=>setRevisionModal(cl)}
              />
            ))}
          </div>
        </>}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
